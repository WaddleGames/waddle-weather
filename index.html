<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minute Forecast</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b1e2d;
    color: white;
    text-align: center;
    padding: 40px;
}

h1 {
    font-size: 2.5em;
}

#summary {
    font-size: 1.5em;
    margin: 20px 0;
}

#current {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}

#current img {
    width: 120px;
    height: auto;
}

#timeline {
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

.bar {
    width: 4px;
    margin: 0 1px;
    background: #4fc3f7;
}

#controls {
    margin-bottom: 20px;
}

#controls input {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    font-size: 1em;
}

#controls button {
    padding: 10px 15px;
    border-radius: 5px;
    border: none;
    background: #4fc3f7;
    color: #0b1e2d;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
}

#controls button:hover {
    background: #29b6f6;
}
    
</style>

</head>

<body>

<h1>Minute-by-Minute Forecast</h1>
    
<div id="controls">
    <input type="number" id="latInput" value="41.8781" step="0.0001" placeholder="Latitude">
    <input type="number" id="lonInput" value="-87.6298" step="0.0001" placeholder="Longitude">
    <button onclick="updateLocation()">Update Location</button>
</div>
    
<div id="summary">Loading...</div>

<div id="current">
    <h2>Current Conditions</h2>
    <img id="weatherIcon" />
    <div id="conditionText"></div>
</div>

<div id="timeline"></div>

<script>

const API_KEY = "p1eTDIbrnfGjCJlwMahUzarQNqzNPyxI";

// Make these variables let so we can update them
let lat = 41.8781;
let lon = -87.6298;

let cachedData = null;
let lastFetchTime = 0;
const CACHE_TIME = 120000;

// Global intervals so we can reset them if needed
let nwsInterval;
let pirateInterval;

// ---------------------------
// HANDLE LOCATION UPDATE
// ---------------------------
function updateLocation() {
    const newLat = parseFloat(document.getElementById("latInput").value);
    const newLon = parseFloat(document.getElementById("lonInput").value);

    if (isNaN(newLat) || isNaN(newLon)) {
        alert("Please enter valid numbers for latitude and longitude.");
        return;
    }

    lat = newLat;
    lon = newLon;

    // Invalidate cache so it forces a fresh download
    cachedData = null;
    lastFetchTime = 0;

    document.getElementById("summary").innerText = "Loading new location...";
    document.getElementById("conditionText").innerText = "Loading current conditions...";
    document.getElementById("weatherIcon").src = "";

    // Run fetches immediately
    loadCurrentConditions();
    fetchWeather();
}

// ---------------------------
// CURRENT CONDITIONS (3-Step NWS Hop)
// ---------------------------
async function loadCurrentConditions() {
    try {
        // Step 1: Get the gridpoint data from coordinates
        const pointRes = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
        if (!pointRes.ok) throw new Error("Location likely outside US NWS coverage.");
        const pointData = await pointRes.json();
        const stationsUrl = pointData.properties.observationStations;

        // Step 2: Get the list of observation stations for this grid
        const stationsRes = await fetch(stationsUrl);
        const stationsData = await stationsRes.json();
        
        // Grab the closest station ID (e.g., KORD)
        if (!stationsData.features || stationsData.features.length === 0) {
            throw new Error("No observation stations found near this location.");
        }
        const stationId = stationsData.features[0].properties.stationIdentifier;

        // Step 3: Get the latest observation from that specific station
        const obsRes = await fetch(`https://api.weather.gov/stations/${stationId}/observations/latest`);
        const obsData = await obsRes.json();
        const props = obsData.properties;

        document.getElementById("conditionText").innerText = props.textDescription || "Unknown";

        if (props.icon) {
            document.getElementById("weatherIcon").src = props.icon;
        }

    } catch (err) {
        console.error("Current conditions error:", err);
        document.getElementById("conditionText").innerText = "Current conditions unavailable (NWS only supports US coordinates).";
        document.getElementById("weatherIcon").src = ""; // Clear broken image
    }
}

// ---------------------------
// PIRATE WEATHER FETCH
// ---------------------------
async function fetchWeather() {
    try {
        const now = Date.now();

        if (cachedData && (now - lastFetchTime < CACHE_TIME)) {
            render(cachedData);
            return;
        }

        const response = await fetch(
            `https://api.pirateweather.net/forecast/${API_KEY}/${lat},${lon}?units=us`
        );

        const data = await response.json();

        cachedData = data;
        lastFetchTime = now;

        render(data);

    } catch (err) {
        console.error("Fetch error:", err);
        document.getElementById("summary").innerText = "Error loading forecast.";
    }
}

// ---------------------------
// RENDER MINUTECast
// ---------------------------
function render(data) {
    if (data.error || data.message) {
        console.error("API Error:", data.error || data.message);
        document.getElementById("summary").innerText = "API Error: " + (data.error || data.message);
        document.getElementById("timeline").innerHTML = "";
        return;
    }

    const minutely = data.minutely;

    if (!minutely || !minutely.data || minutely.data.length === 0) {
        document.getElementById("summary").innerText = "No precipitation expected for the next 60 minutes.";
        document.getElementById("timeline").innerHTML = "";
        return;
    }

    document.getElementById("summary").innerText = minutely.summary;

    const container = document.getElementById("timeline");
    container.innerHTML = "";

    minutely.data.forEach(min => {
        const bar = document.createElement("div");
        bar.className = "bar";

        const height = Math.max(min.precipIntensity * 200, 2);
        bar.style.height = height + "px";

        if (min.precipProbability > 0.7) {
            bar.style.background = "#ff5252";
        } else if (min.precipProbability > 0.3) {
            bar.style.background = "#ffd54f";
        } else {
            bar.style.background = "#4fc3f7";
        }

        container.appendChild(bar);
    });
}

// ---------------------------
// STARTUP
// ---------------------------
function start() {
    loadCurrentConditions();
    nwsInterval = setInterval(loadCurrentConditions, 300000); 

    fetchWeather();
    pirateInterval = setInterval(fetchWeather, 180000);
}

start();
