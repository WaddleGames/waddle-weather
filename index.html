<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minute Forecast - Precision View</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b1e2d;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        #dashboard {
            max-width: 650px;
            margin: auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Y-Axis and Graph Container */
        .chart-frame {
            display: flex;
            height: 250px;
            margin-top: 30px;
            position: relative;
        }

        .y-axis {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-right: 10px;
            font-size: 0.7em;
            color: #888;
            text-align: right;
            width: 40px;
        }

        #timeline {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            border-bottom: 2px solid #444;
            border-left: 2px solid #444;
            padding-bottom: 2px;
        }

        .bar {
            flex: 1;
            border-radius: 2px 2px 0 0;
            transition: height 0.5s ease;
        }

        /* X-Axis Time Labels */
        .x-axis {
            display: flex;
            margin-left: 52px; /* Align with graph start */
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.8em;
            color: #4fc3f7;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.85em;
        }

        .legend-item { display: flex; align-items: center; gap: 6px; }
        .box { width: 12px; height: 12px; border-radius: 2px; }

        #weatherIcon { width: 80px; height: 80px; border-radius: 8px; margin: 10px 0; }
        #precipTotal { font-size: 2em; color: #4fc3f7; font-weight: bold; }
        #stationName { color: #888; font-size: 0.75em; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="dashboard">
    <div id="stationName">WEATHER STATION SEARCHING...</div>
    <img id="weatherIcon" src="" style="display:none;">
    <div id="conditionText">Updating...</div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

    <div style="font-size: 0.9em; opacity: 0.8;">24-Hour Accumulation</div>
    <div id="precipTotal">0.00"</div>
    <div id="summary">Calculating minute-cast...</div>

    <div class="chart-frame">
        <div class="y-axis">
            <div>Heavy</div>
            <div>Mod</div>
            <div>Light</div>
            <div>Trace</div>
        </div>
        <div id="timeline"></div>
    </div>
    
    <div class="x-axis">
        <span>NOW</span>
        <span>15m</span>
        <span>30m</span>
        <span>45m</span>
        <span>60m</span>
    </div>

    <div class="legend" style="margin-top: 30px;">
        <div class="legend-item"><div class="box" style="background:#4fc3f7"></div> Light Rain</div>
        <div class="legend-item"><div class="box" style="background:#ffd54f"></div> Moderate</div>
        <div class="legend-item"><div class="box" style="background:#ff5252"></div> Heavy Rain</div>
    </div>
</div>

<script>
    const API_KEY = "p1eTDIbrnfGjCJlwMahUzarQNqzNPyxI";
    const lat = 41.8781, lon = -87.6298;

    async function loadAll() {
        try {
            // 1. NWS Data
            const p = await (await fetch(`https://api.weather.gov/points/${lat},${lon}`)).json();
            const s = await (await fetch(p.properties.observationStations)).json();
            const station = s.features[0];
            document.getElementById('stationName').innerText = "AT " + station.properties.name.toUpperCase();
            
            const o = await (await fetch(`https://api.weather.gov/stations/${station.properties.stationIdentifier}/observations/latest`)).json();
            document.getElementById('conditionText').innerText = o.properties.textDescription;
            document.getElementById('weatherIcon').src = o.properties.icon;
            document.getElementById('weatherIcon').style.display = 'inline-block';

            // 2. Pirate Weather
            const res = await fetch(`https://api.pirateweather.net/forecast/${API_KEY}/${lat},${lon}?units=us`);
            const data = await res.json();
            
            // 24hr Total
            let total = 0;
            data.hourly.data.slice(0, 24).forEach(h => total += (h.precipIntensity || 0));
            document.getElementById('precipTotal').innerText = total.toFixed(2) + '"';
            document.getElementById('summary').innerText = data.minutely.summary;

            // Minute Bars
            const container = document.getElementById('timeline');
            container.innerHTML = "";
            
            data.minutely.data.forEach(m => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                const intensity = m.precipIntensity || 0;
                
                // Height: Max height in CSS is 250px. 0.5 in/hr is a massive storm.
                // We map 0.4 in/hr to full height.
                const h = Math.min(intensity * 600, 240); 
                bar.style.height = Math.max(h, 2) + "px";
                
                // NEW COLOR LOGIC based on Intensity (inches per hour)
                if (intensity > 0.3) bar.style.background = "#ff5252";      // Heavy
                else if (intensity > 0.1) bar.style.background = "#ffd54f"; // Moderate
                else if (intensity > 0) bar.style.background = "#4fc3f7";   // Light
                else bar.style.background = "rgba(255,255,255,0.1)";         // No Rain
                
                container.appendChild(bar);
            });

        } catch (e) { console.error(e); }
    }

    window.onload = loadAll;
</script>
</body>
</html>
